x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
    - ~/.google-mcp:/root/.google-mcp

services:
  nanobot-whatsapp-bridge:
    container_name: nanobot-whatsapp-bridge
    <<: *common-config
    command: ["channels", "login", "whatsapp"]
    restart: unless-stopped
    environment:
      - BRIDGE_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    depends_on:
      - nanobot-whatsapp-bridge
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
